name: CD – Deploy to Production

on:
  push:
    branches: [master, main]
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: production
        type: choice
        options: [staging, production]

env:
  PYTHON_VERSION: "3.11"
  IMAGE_NAME: ai-knowledge-system
  REGISTRY: ghcr.io

jobs:
  # ── Build & Push Docker Image ─────────────────────────────────────────────
  build-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to Staging ─────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy – Staging
    runs-on: ubuntu-latest
    needs: build-push
    environment:
      name: staging
      url: https://staging.your-domain.com  # TODO: update with real URL

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to staging server
        # Replace this step with your actual deploy method:
        # - AWS ECS: use aws-actions/amazon-ecs-deploy-task-definition
        # - GCP Cloud Run: use google-github-actions/deploy-cloudrun
        # - Self-hosted: SSH + docker pull + docker-compose up
        run: |
          echo "Deploying ${{ needs.build-push.outputs.image_tag }} to staging..."
          echo "TODO: Configure your deployment target (AWS ECS / GCP Cloud Run / SSH)"
          # Example for SSH deploy (uncomment and configure secrets):
          # - uses: appleboy/ssh-action@v1
          #   with:
          #     host: ${{ secrets.STAGING_HOST }}
          #     username: ${{ secrets.STAGING_USER }}
          #     key: ${{ secrets.STAGING_SSH_KEY }}
          #     script: |
          #       docker pull ${{ needs.build-push.outputs.image_tag }}
          #       docker-compose up -d

  # ── Deploy to Production (tag-triggered or manual) ────────────────────────
  deploy-production:
    name: Deploy – Production
    runs-on: ubuntu-latest
    needs: [build-push, deploy-staging]
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.environment == 'production'
    environment:
      name: production
      url: https://your-domain.com  # TODO: update with real URL

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to production
        run: |
          echo "Deploying ${{ needs.build-push.outputs.image_tag }} to production..."
          echo "TODO: Configure your production deployment target"
