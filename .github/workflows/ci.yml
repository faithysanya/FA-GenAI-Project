name: CI

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ── Lint & Type Check ─────────────────────────────────────────────────────
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install lint tools
        run: pip install ruff

      - name: Ruff lint
        run: ruff check app/ config/ tests/ --ignore E501

  # ── Unit & Integration Tests ──────────────────────────────────────────────
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install fastapi uvicorn python-dotenv pydantic anthropic chromadb \
                      PyPDF2 pandas openpyxl chardet pydantic-settings \
                      pytest pytest-asyncio httpx

      - name: Create required directories and .env
        run: |
          mkdir -p data/uploads data/vectors
          echo "CLAUDE_API_KEY=sk-ant-mock-key-for-testing" >> .env
          echo "VECTOR_DB_TYPE=chroma" >> .env
          echo "VECTOR_DB_PATH=./data/vectors" >> .env
          echo "LOG_LEVEL=INFO" >> .env
          echo "ENVIRONMENT=test" >> .env

      - name: Run tests
        run: pytest tests/ -v --tb=short -x

  # ── Docker Build ──────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ai-knowledge-system:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
